spring:
  application:
    name: sambo

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sambo}
    username: ${DB_USER:sambo}
    password: ${DB_PASSWORD:sambo}

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; JPA only validates.
    open-in-view: false           # Force explicit transactions; avoids N+1 surprises in controllers.
    properties:
      hibernate:
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

# --- application config ----------------------------------------------------

sambo:
  jwt:
    # Dev-only secret. In prod inject via SAMBO_JWT_SECRET (e.g. from GCP Secret Manager).
    # Generate fresh: `openssl rand -base64 48`
    secret: ${SAMBO_JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1pbi1wcm9kdWN0aW9uLW1pbi0zMi1ieXRlcw==}
    issuer: sambo
    audience: sambo
    access-token-ttl: PT24H        # 24h while developing; tighten before prod.

  google:
    # OAuth client IDs we accept on /api/auth/google. Comma-sep via env var.
    # iOS + Android client IDs from Google Cloud Console.
    audiences: ${SAMBO_GOOGLE_AUDIENCES:placeholder.apps.googleusercontent.com}

logging:
  level:
    com.sambo: INFO
    com.sambo.auth: DEBUG          # Verbose during dev so token-rejection reasons show up.
    org.hibernate.SQL: INFO
